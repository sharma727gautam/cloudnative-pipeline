apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudnative-app
  namespace: cloudnative
  labels:
    app: cloudnative-app
    version: "1.0.0"
    environment: local
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudnative-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: cloudnative-app
        version: "1.0.0"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: cloudnative-app
          image: cloudnative-pipeline:v1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cloudnative-app-config
            - secretRef:
                name: cloudnative-app-secret
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext: 
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: 
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
      restartPolicy: Always
