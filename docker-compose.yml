version: "3.9"

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile 

    container_name: cloudnative-app

    ports:
      - "5000:5000"

    environment: 
      - FLASK_ENV= production
      - PORT=5000
      - APP_VERSION=1.0.0

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 5s

    volumes:
      - app-logs:/app/logs

    networks:
      - cloudnative-network

volumes:
  app-logs:
    driver: local
  
networks:
  cloudnative-network:
    driver: bridge